name: RAV4 Tracker

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch:          # allow manual runs from the GitHub UI

jobs:
  check-inventory:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install playwright && playwright install chrome

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Run tracker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: xvfb-run -a python tracker.py

      - name: Upload debug screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: data/debug_screenshot.png
          if-no-files-found: ignore

      - name: Save updated VIN store
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_vins.json
          git diff --cached --quiet || git commit -m "chore: update seen VINs [skip ci]"
          git push
